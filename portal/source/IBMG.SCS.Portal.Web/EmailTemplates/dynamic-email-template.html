<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>@Raw(Model.Title)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            padding: 0;
            margin: 0;
        }

        .email-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 0;
            border-radius: 10px;
        }
        .button {
            display: inline-block;
            background: #F9B233;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 15px; /* Space between button and image */
        }
        .center-elements {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            background: #21313C;
            text-align: center;
            color: white;
        }
        .top-bar {
            background: #21313C;
        }

        .logo {
            margin: 3px;
        }

        .content {
            padding: 20px;
            text-align: center;
            color: #333;
        }

            .content h2 {
                color: #21313C;
                margin-bottom: 10px;
            }

       

        .footer {
            background: #21313C;
            padding: 20px;
            text-align: center;
            color: white;
            font-size: 12px;
        }
            .footer a {
                color: #F9B233;
                text-decoration: none;
            }
            .icons
            {
                display:flex;
                gap:30px;
                justify-content:center;
            }

      
    </style>
</head>
